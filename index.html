<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>Exercises</title>

    <link rel="manifest" href="./manifest.json">
    <script>
      if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("./service-worker.js");
      }
    </script>

    <style>
      :root {
        --gap:14px; --r:16px;
        --bg:#0c0c14; --card:#151520; --card-border:#1e1e30;
        --text:#e8e8f0; --text-muted:rgba(232,232,240,.55);
        --accent:#818cf8;
        --clr-stretch:#f59e0b; --clr-motor:#818cf8; --clr-rehab:#38bdf8; --clr-strength:#c084fc; --clr-cond:#fb7185;
        --done-glow:rgba(74,222,128,.12);
        font-family: -apple-system, system-ui, "SF Pro Display", "SF Pro Text", Arial, sans-serif;
      }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--text); }
      .wrap { padding: max(env(safe-area-inset-top),24px) max(env(safe-area-inset-right),20px) max(env(safe-area-inset-bottom),24px) max(env(safe-area-inset-left),20px);
              max-width:720px; margin:0 auto; }
      h1 { margin:0 0 6px; font-size:24px; font-weight:700; letter-spacing:-.3px; }
      h2.section { margin:20px 0 10px; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1.2px; color:var(--text-muted); }

      /* --- List Items --- */
      .list { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
      .list-item { display:flex; align-items:center; gap:12px; background:var(--card); border-radius:12px; padding:14px 16px;
                   color:var(--text); text-decoration:none; border:1px solid var(--card-border); border-left:3px solid var(--item-accent, var(--card-border));
                   position:relative; transition:background .15s ease, transform .1s ease, box-shadow .25s ease, border-color .2s ease;
                   -webkit-user-select:none; user-select:none; }
      .list-item:active { transform:scale(.98); }
      .list-item.done { border-left-color:#4ade80; box-shadow:0 0 16px var(--done-glow), 0 2px 8px rgba(0,0,0,.2); }
      .list-item-text { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
      .list-item-name { font-size:14px; font-weight:600; line-height:1.2; }
      .list-item-meta { font-size:12px; color:var(--text-muted); }
      .list-item-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
      .list-item-count { text-align:right; font-variant-numeric:tabular-nums; min-width:3ch; }
      .list-item-count-val { display:block; font-size:14px; font-weight:700; }
      .list-item-count-unit { display:block; font-size:11px; color:var(--text-muted); line-height:1; }
      .list-item.done .list-item-count-val { color:#4ade80; }

      /* --- Detail Card --- */
      .card { max-width:560px; margin:0 auto; background:var(--card); border-radius:var(--r); padding:24px; border:1px solid var(--card-border); }
      .back { display:inline-flex; align-items:center; gap:6px; margin-bottom:14px; color:var(--accent); text-decoration:none; font-size:14px; font-weight:500; }
      .row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
      .muted { color:var(--text-muted); font-size:13px; }
      .btn { border:0; border-radius:14px; padding:14px 18px; background:#1c1c2e; color:var(--text); font-size:19px; font-weight:500; line-height:1;
             cursor:pointer; transition: transform .1s ease, background .15s ease; border:1px solid var(--card-border); }
      .btn:hover { background:#24243a; }
      .btn:active { transform: scale(0.95); }
      label { display:block; margin:20px 0 6px; font-size:13px; font-weight:500; color:var(--text-muted); }
      input[type="date"] { font-size:14px; padding:10px 12px; border-radius:10px; border:1px solid var(--card-border); background:var(--bg); color:var(--text); }
      .note { color:var(--text-muted); font-size:13px; margin-top:12px; min-height:1em; transition:opacity .2s; }

      /* --- Steppers (one row per field: sets, reps/unit, weight) --- */
      .steppers { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
      .step-row { display:flex; align-items:center; gap:12px; }
      .step-label { width:62px; flex-shrink:0; font-size:13px; font-weight:600; color:var(--text-muted); }
      .step-val { flex:1; font-variant-numeric:tabular-nums; font-size:30px; font-weight:700; text-align:center; letter-spacing:-.5px; }
      .step-unit { width:30px; flex-shrink:0; text-align:left; }
      .entry-total { margin-top:12px; font-size:13px; font-variant-numeric:tabular-nums; }

      .chart-wrap { margin-top:20px; background:var(--bg); border:1px solid var(--card-border); border-radius:14px; padding:14px; }
      .chart-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:0 0 8px; flex-wrap:wrap; }
      .seg { display:inline-flex; background:#1c1c2e; border:1px solid var(--card-border); border-radius:10px; overflow:hidden; }
      .seg button { border:0; background:transparent; color:var(--text-muted); font-size:12px; font-weight:600; padding:6px 12px; cursor:pointer; transition:background .15s ease, color .15s ease; }
      .seg button + button { border-left:1px solid var(--card-border); }
      .seg button.active { background:#2a2a40; color:var(--text); }
      canvas { width:100%; height:180px; display:block; cursor:grab; touch-action:none; }

      /* --- Toolbar --- */
      .toolbar { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
      .toolbar-btn { border:0; border-radius:10px; padding:9px 14px; background:#1c1c2e; color:var(--text-muted); font-size:13px; font-weight:500; cursor:pointer;
                     border:1px solid var(--card-border); transition: transform .1s ease, background .15s ease, color .15s ease; }
      .toolbar-btn:hover { background:#24243a; color:var(--text); }
      .toolbar-btn:active { transform: scale(0.97); }

      /* --- Stats --- */
      .stats { display:grid; grid-template-columns: repeat(auto-fit, minmax(100px,1fr)); gap:8px; margin-top:16px; }
      .stat { background:var(--bg); border:1px solid var(--card-border); border-radius:12px; padding:12px 8px; text-align:center; }
      .stat-val { font-size:20px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-.3px; }
      .stat-label { font-size:10px; font-weight:500; color:var(--text-muted); margin-top:4px; text-transform:uppercase; letter-spacing:.5px; }
      .stat-arrow-up { color:#4ade80; }
      .stat-arrow-down { color:#f87171; }
      .stat-arrow-same { color:var(--accent); }

      /* --- Dashboard --- */
      .dash-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
      .dash-overall { display:grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap:10px; margin-bottom:24px; }
      .dash-overall .stat { background:var(--card); border:1px solid var(--card-border); }
      .dash-cat { background:var(--card); border:1px solid var(--card-border); border-radius:var(--r); padding:18px; margin-bottom:14px; }
      .dash-cat-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
      .dash-cat-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; }
      .dash-cat-pct { font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; }
      .dash-bar-track { height:6px; background:rgba(255,255,255,.08); border-radius:3px; overflow:hidden; margin-bottom:14px; }
      .dash-bar-fill { height:100%; border-radius:3px; transition:width .3s ease; }
      .dash-ex-row { display:flex; align-items:center; gap:10px; padding:6px 0; }
      .dash-ex-row + .dash-ex-row { border-top:1px solid rgba(255,255,255,.05); }
      .dash-ex-name { font-size:12px; font-weight:500; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .dash-ex-freq { font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; width:40px; text-align:right; }
      .dash-spark { display:flex; align-items:flex-end; gap:1px; height:20px; }
      .dash-spark-bar { width:4px; border-radius:1px; min-height:1px; }
      .dash-ex-status { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

      /* --- Zone dot --- */
      .tile-zone { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
      .zone-green  { background:#4ade80; }
      .zone-yellow { background:#fbbf24; }
      .zone-red    { background:#f87171; }
      .zone-grey   { background:rgba(232,232,240,.25); }

      /* --- Animations --- */
      .fade { animation: fade .2s ease; } @keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
      @keyframes slideInRight  { from { opacity:0; transform:translateX(60px) } to { opacity:1; transform:none } }
      @keyframes slideInLeft   { from { opacity:0; transform:translateX(-60px) } to { opacity:1; transform:none } }
      .slide-right .card { animation: slideInRight .22s cubic-bezier(.16,1,.3,1); }
      .slide-left  .card { animation: slideInLeft  .22s cubic-bezier(.16,1,.3,1); }
      html, body { touch-action: manipulation; }
      .btn { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div class="wrap" id="app"></div>

    <script>
      /* ====== CONFIG ====== */
      const EXERCISES = [
          /* Stretches — 5x/week */
          {id:"hip-flexor-stretch", name:"Half-Kneeling Hip-Flexor Stretch", unit:"sec",  dpw:5, clr:"stretch"},
          {id:"hamstring-stretch",  name:"Supine Hamstring Stretch",         unit:"sec",  dpw:5, clr:"stretch"},
          {id:"figure4-stretch",    name:"Figure-4 Piriformis Stretch",      unit:"sec",  dpw:5, clr:"stretch"},

          /* Motor control — 5x/week */
          {id:"side-plank",         name:"Side Plank",           unit:"sec",  dpw:5, clr:"motor"},
          {id:"bird-dog",           name:"Bird-Dog",             unit:"reps", dpw:5, clr:"motor"},
          {id:"mcgill-curlup",      name:"McGill Curl-Up",       unit:"sec",  dpw:5, clr:"motor"},
          {id:"dead-bug",           name:"Dead Bug",             unit:"reps", dpw:5, clr:"motor"},
          {id:"cat-camel",          name:"Cat\u2013Camel",       unit:"reps", dpw:5, clr:"motor"},

          /* Rehab strengthening — 3x/week */
          {id:"suitcase-carry",     name:"Suitcase Carry",       unit:"sec",  dpw:3, clr:"rehab"},
          {id:"glute-bridge",       name:"Glute Bridge",         unit:"reps", dpw:3, clr:"rehab", loadable:true},
          {id:"clamshell",          name:"Clamshell",            unit:"reps", dpw:3, clr:"rehab"},
          {id:"draken",             name:"Draken",               unit:"reps", dpw:3, clr:"rehab"},
          {id:"rubber-band-archer", name:"Rubber Band Archer Pull", unit:"reps", dpw:3, clr:"rehab"},
          {id:"rubber-band-row",    name:"Rubber Band Row",      unit:"reps", dpw:3, clr:"rehab"},
          {id:"banded-air-cycling", name:"Banded Air Cycling",   unit:"reps", dpw:3, clr:"rehab"},
          {id:"sprint-pull",        name:"Sprint Pull",          unit:"reps", dpw:3, clr:"rehab"},
          {id:"banded-er-90",       name:"Banded 90/90 External Rotation", unit:"reps", dpw:3, clr:"rehab"},
          {id:"banded-serratus-punch", name:"Banded Serratus Punch", unit:"reps", dpw:3, clr:"rehab"},
          {id:"banded-pull-apart-raise", name:"Banded Pull-Apart with Raise", unit:"reps", dpw:3, clr:"rehab"},

          /* Strength — 3x/week per exercise: needs 48-72h recovery */
          {id:"pushups",            name:"Push-Ups",             unit:"reps", dpw:3, clr:"strength"},
          {id:"pullups",            name:"Pull-Ups",             unit:"reps", dpw:3, clr:"strength"},

          /* Conditioning — pooled 2x/week: pick any, interchangeable cardio */
          {id:"walking",            name:"Walking",              unit:"100m", dpw:2, clr:"cond"},
          {id:"running",            name:"Running",              unit:"100m", dpw:2, clr:"cond"},
          {id:"swimming",           name:"Swimming",             unit:"25m", dpw:2, clr:"cond"},
          {id:"skiing",             name:"Skiing",               unit:"km",   dpw:2, clr:"cond"}
      ];

      const CLR_MAP = { stretch:'var(--clr-stretch)', motor:'var(--clr-motor)', rehab:'var(--clr-rehab)', strength:'var(--clr-strength)', cond:'var(--clr-cond)' };
      const SECTION_LABELS = { stretch:'Stretches', motor:'Motor Control', rehab:'Rehab Strengthening', strength:'Strength', cond:'Conditioning' };
      // Categories with pooled frequency: target is shared across all exercises in the category
      // (e.g., "do any form of cardio 2x/week" rather than "run 2x AND swim 2x AND ski 2x")
      const CAT_DPW = { cond: 2 };

      // Loadable exercises gain a weight stepper and a Weight chart. WEIGHT_STEP
      // is how much one +/- tap changes the load, in WEIGHT_UNIT. The middle
      // stepper is labelled from the unit, so timed and counted exercises share
      // one layout without special-casing.
      const WEIGHT_UNIT = 'kg';
      const WEIGHT_STEP = 0.5;
      const UNIT_LABEL = { reps:'Reps', sec:'Seconds' };

      const WINDOW_DAYS = 14;
      const MS_PER_DAY = 86400000;

      const app = document.getElementById('app');
      const todayStr = () => new Date().toISOString().slice(0,10);
      const addDays = (d, n) => { const dt = new Date(d); dt.setUTCDate(dt.getUTCDate()+n); return dt; };
      const isoDate = (d) => new Date(d).toISOString().slice(0,10);
      const clamp = (v,min,max) => Math.min(max, Math.max(min, v));

      function keysFor(id, date) {
          return {
              count:  `ex:${id}:${date}:count`,
              sets:   `ex:${id}:${date}:sets`,
              reps:   `ex:${id}:${date}:reps`,
              weight: `ex:${id}:${date}:weight`
          };
      }

      /* Read the structured entry for a day.
         count is the canonical daily volume = sets × reps on new entries.
         Old days carry only count; sets defaults to 1, reps defaults to count. */
      function readEntry(id, date) {
          const k = keysFor(id, date);
          const count = parseInt(localStorage.getItem(k.count) || "0", 10) || 0;
          const setsRaw = localStorage.getItem(k.sets);
          const repsRaw = localStorage.getItem(k.reps);
          const weightRaw = localStorage.getItem(k.weight);
          const sets   = setsRaw   !== null ? (parseInt(setsRaw, 10)   || 0) : 1;
          const reps   = repsRaw   !== null ? (parseInt(repsRaw, 10)   || 0) : count;
          const weight = weightRaw !== null ? (parseFloat(weightRaw)   || 0) : 0;
          return { count, sets, reps, weight };
      }

      /* Write a structured entry. count = sets × reps stays the canonical daily
         volume, so the volume engine reads it unchanged. Weight is recorded only
         for loadable exercises and only on performed days (count > 0), so the
         weight series never holds a load for a day that was not trained. */
      function writeEntry(id, date, ex, { sets, reps, weight }) {
          const k = keysFor(id, date);
          const s = Math.max(0, sets | 0);
          const r = Math.max(0, reps | 0);
          const count = s * r;
          localStorage.setItem(k.count, String(count));
          localStorage.setItem(k.sets,  String(s));
          localStorage.setItem(k.reps,  String(r));
          if (ex.loadable) {
              const w = count > 0 ? Math.max(0, weight || 0) : 0;
              localStorage.setItem(k.weight, String(w));
          }
      }
      function daysBetween(a, b) {
          const A = new Date(a), B = new Date(b);
          const aa = Date.UTC(A.getUTCFullYear(), A.getUTCMonth(), A.getUTCDate());
          const bb = Date.UTC(B.getUTCFullYear(), B.getUTCMonth(), B.getUTCDate());
          return Math.floor((bb - aa) / MS_PER_DAY);
      }
      function parseDateKey(k, id, field) {
          const pfx = `ex:${id}:`, sfx = `:${field}`;
          if (!k.startsWith(pfx) || !k.endsWith(sfx)) return null;
          const ds = k.slice(pfx.length, -sfx.length);
          return /^\d{4}-\d{2}-\d{2}$/.test(ds) ? ds : null;
      }

      /* ====== METRICS ======
         A metric is a per-day numeric series read from one storage field, with
         analytics options describing how it accumulates:
           volume  count  weekly accumulation (summed over the week, ×7)
           weight  kg     level averaged over the days actually trained
         The same EWMA / baseline / green-zone machinery serves both; the two
         flags below are the only difference between them. */
      const VOL_OPTS = { weekly: true,  activeOnly: false };
      const WT_OPTS  = { weekly: false, activeOnly: true  };

      function seriesFor(id, field) {
          const result = {};
          for (let i = 0; i < localStorage.length; i++) {
              const k = localStorage.key(i);
              if (!k) continue;
              const ds = parseDateKey(k, id, field);
              if (ds) {
                  const v = parseFloat(localStorage.getItem(k) || "0");
                  if (v > 0) result[ds] = v;
              }
          }
          return result;
      }
      const volumeSeries = (id) => seriesFor(id, 'count');
      const weightSeries = (id) => seriesFor(id, 'weight');

      function getAllData() {
          const result = {};
          for (let i = 0; i < localStorage.length; i++) {
              const k = localStorage.key(i);
              if (!k || !k.startsWith('ex:')) continue;
              result[k] = localStorage.getItem(k);
          }
          return result;
      }

      function getStreak(data) {
          const today = todayStr();
          let current = 0, best = 0, run = 0;
          const todayVal = data[today] || 0;
          const yesterdayVal = data[isoDate(addDays(new Date(today), -1))] || 0;
          if (todayVal === 0 && yesterdayVal === 0) { return { current: 0, best: 0 }; }
          const startOffset = todayVal > 0 ? 0 : 1;
          for (let i = startOffset; i < 3650; i++) {
              const ds = isoDate(addDays(new Date(today), -i));
              if (data[ds]) { current++; } else { break; }
          }
          const dates = Object.keys(data).sort();
          for (let i = 0; i < dates.length; i++) {
              if (i === 0 || daysBetween(dates[i-1], dates[i]) === 1) {
                  run++;
              } else {
                  run = 1;
              }
              if (run > best) best = run;
          }
          return { current, best };
      }

      function getWeekTotal(id, weeksAgo) {
          const today = new Date(todayStr());
          const end = addDays(today, -(weeksAgo * 7));
          let total = 0;
          for (let i = 0; i < 7; i++) {
              const ds = isoDate(addDays(end, -i));
              const v = parseInt(localStorage.getItem(keysFor(id, ds).count) || "0", 10);
              if (!isNaN(v)) total += v;
          }
          return total;
      }

      const EWMA_HALF_LIFE = 14;
      const EWMA_LOOKBACK = EWMA_HALF_LIFE * 4;
      const EWMA_LAMBDA = Math.LN2 / EWMA_HALF_LIFE;

      const BASELINE_HALF_LIFE = 60;
      const BASELINE_LOOKBACK = BASELINE_HALF_LIFE * 4;
      const BASELINE_LAMBDA = Math.LN2 / BASELINE_HALF_LIFE;

      const BASELINE_MIN_DAYS = 90;
      const ZONE_TOP = 1.15;

      /* Exponentially-weighted average of `data` ending at endDate.
         weekly:     scale the daily average to a weekly total (×7), for accumulations.
         activeOnly: count only days that hold data, giving a sustained level rather
                     than a rate dragged toward zero by rest days. */
      function ewmaAt(data, endDate, lambda, lookback, opts) {
          let wSum = 0, wTotal = 0;
          for (let i = 0; i < lookback; i++) {
              const ds = isoDate(addDays(endDate, -i));
              const present = data[ds] !== undefined;
              if (opts.activeOnly && !present) continue;
              const v = present ? data[ds] : 0;
              const w = Math.exp(-lambda * i);
              wSum += w * v;
              wTotal += w;
          }
          if (wTotal === 0) return 0;
          const avg = wSum / wTotal;
          return opts.weekly ? avg * 7 : avg;
      }

      function ewmaWeeklyAt(data, endDate, opts) {
          return ewmaAt(data, endDate, EWMA_LAMBDA, EWMA_LOOKBACK, opts);
      }

      function baselineAt(data, endDate, opts) {
          return ewmaAt(data, endDate, BASELINE_LAMBDA, BASELINE_LOOKBACK, opts);
      }

      function linRegSlope(ys) {
          const n = ys.length;
          if (n < 2) return 0;
          let sx = 0, sy = 0, sxy = 0, sxx = 0;
          for (let i = 0; i < n; i++) {
              sx += i; sy += ys[i]; sxy += i * ys[i]; sxx += i * i;
          }
          const denom = n * sxx - sx * sx;
          if (denom === 0) return 0;
          return (n * sxy - sx * sy) / denom;
      }

      function trendPerMonth(data, days, opts) {
          const today = new Date(todayStr());
          const vals = [];
          for (let i = days - 1; i >= 0; i--) {
              vals.push(ewmaWeeklyAt(data, addDays(today, -i), opts));
          }
          return linRegSlope(vals) * 30;
      }

      /* Highest baseline EWMA ever sustained; the green zone anchors here.
         Ratchets upward only and requires BASELINE_MIN_DAYS of history first. */
      function bestEwma(data, opts) {
          const dates = Object.keys(data).sort();
          if (dates.length === 0) return 0;
          const today = new Date(todayStr());
          const span = daysBetween(dates[0], todayStr());
          if (span < BASELINE_MIN_DAYS) return 0;
          let best = 0;
          for (let d = 0; d <= span - BASELINE_MIN_DAYS; d++) {
              const val = baselineAt(data, addDays(today, -d), opts);
              if (val > best) best = val;
          }
          return best;
      }

      function zonePosition(data, opts) {
          const baseline = bestEwma(data, opts);
          if (baseline === 0) return { cls: 'zone-grey', label: 'Insufficient data', pct: null };
          const recent = ewmaWeeklyAt(data, new Date(todayStr()), opts);
          const ratio = recent / baseline;
          const pct = Math.round(ratio * 100);
          if (ratio < 1.00 - 1e-9) return { cls: 'zone-grey',   label: `${pct}% of peak`, pct };
          if (ratio <= ZONE_TOP) return { cls: 'zone-green',  label: `${pct}% of peak, green zone`, pct };
          if (ratio <= 1.30)     return { cls: 'zone-yellow', label: `${pct}% of peak, ease off`, pct };
          return { cls: 'zone-red', label: `${pct}% of peak, back off`, pct };
      }

      function progressZone(id) { return zonePosition(volumeSeries(id), VOL_OPTS); }

      function bestWeekEver(data) {
          const dates = Object.keys(data).sort();
          if (dates.length === 0) return 0;
          const today = new Date(todayStr());
          const span = daysBetween(dates[0], todayStr());
          let best = 0;
          for (let offset = 0; offset <= span; offset++) {
              const end = addDays(today, -offset);
              let sum = 0;
              for (let i = 0; i < 7; i++) {
                  const ds = isoDate(addDays(end, -i));
                  if (data[ds]) sum += data[ds];
              }
              if (sum > best) best = sum;
          }
          return best;
      }

      /* ====== ON-TRACK LOGIC (sliding 7-day window) ====== */
      function getCurrentWeekProgress(id) {
          const today = new Date(todayStr());
          let days = 0;
          for (let i = 0; i < 7; i++) {
              const ds = isoDate(addDays(today, -i));
              const v = parseInt(localStorage.getItem(keysFor(id, ds).count) || "0", 10);
              if (v > 0) days++;
          }
          return days;
      }

      function getCategoryWeekProgress(cat) {
          const today = new Date(todayStr());
          const catExercises = EXERCISES.filter(e => e.clr === cat);
          let days = 0;
          for (let i = 0; i < 7; i++) {
              const ds = isoDate(addDays(today, -i));
              const anyDone = catExercises.some(ex =>
                  parseInt(localStorage.getItem(keysFor(ex.id, ds).count) || "0", 10) > 0
              );
              if (anyDone) days++;
          }
          return days;
      }

      function isOnTrack(id, dpw) {
          const todayCount = parseInt(localStorage.getItem(keysFor(id, todayStr()).count) || "0", 10);
          if (todayCount > 0) return true;
          const ex = EXERCISES.find(e => e.id === id);
          const pooledDpw = ex ? CAT_DPW[ex.clr] : undefined;
          if (pooledDpw !== undefined) {
              return getCategoryWeekProgress(ex.clr) >= pooledDpw;
          }
          return getCurrentWeekProgress(id) >= dpw;
      }

      /* ====== EXPORT / IMPORT ====== */
      function exportData() {
          const data = getAllData();
          const payload = {
              version: 1,
              exported: new Date().toISOString(),
              entries: Object.keys(data).length,
              data: data
          };
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `exercises-backup-${todayStr()}.json`;
          a.click();
          URL.revokeObjectURL(url);
      }

      function importData() {
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = '.json';
          input.addEventListener('change', () => {
              const file = input.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = () => {
                  try {
                      const payload = JSON.parse(reader.result);
                      if (!payload.data || typeof payload.data !== 'object') {
                          alert('Invalid backup file: missing data.');
                          return;
                      }
                      const keys = Object.keys(payload.data).filter(k => k.startsWith('ex:'));
                      if (keys.length === 0) {
                          alert('No exercise data found in file.');
                          return;
                      }
                      let newCount = 0, overwriteCount = 0;
                      for (const k of keys) {
                          const existing = localStorage.getItem(k);
                          if (existing === null) newCount++;
                          else if (existing !== payload.data[k]) overwriteCount++;
                      }
                      let msg = `Found ${keys.length} entries.\n\n`;
                      msg += `  ${newCount} new entries will be added.\n`;
                      if (overwriteCount > 0) {
                          msg += `  ${overwriteCount} existing entries differ and will be OVERWRITTEN.\n`;
                      }
                      msg += `\nProceed?`;
                      if (!confirm(msg)) return;
                      for (const k of keys) {
                          localStorage.setItem(k, payload.data[k]);
                      }
                      alert(`Imported ${keys.length} entries.`);
                      route();
                  } catch (e) {
                      alert('Failed to read backup file: ' + e.message);
                  }
              };
              reader.readAsText(file);
          });
          input.click();
      }

      /* ---------- HOME ---------- */
      function renderHome() {
          document.title = "Exercises";
          const today = todayStr();

          // Group exercises by category for section headers
          let html = `<h1>Exercises</h1>
    <div class="toolbar">
      <a class="toolbar-btn" href="#dashboard" style="text-decoration:none">Dashboard</a>
      <button class="toolbar-btn" id="btn-export">Export Backup</button>
      <button class="toolbar-btn" id="btn-import">Import Backup</button>
    </div>`;

          let lastClr = null;
          let listOpen = false;
          for (const x of EXERCISES) {
              if (x.clr !== lastClr) {
                  if (listOpen) html += '</div>';
                  html += `<h2 class="section" style="color:${CLR_MAP[x.clr]}">${SECTION_LABELS[x.clr]}</h2><div class="list fade">`;
                  listOpen = true;
                  lastClr = x.clr;
              }
              const count = parseInt(localStorage.getItem(keysFor(x.id, today).count) || "0", 10);
              const c = isNaN(count) ? 0 : count;
              const done = isOnTrack(x.id, x.dpw);
              const zone = progressZone(x.id);
              html += `
      <a class="list-item${done?' done':''}" href="#${x.id}" aria-label="${x.name}" style="--item-accent:${CLR_MAP[x.clr]}">
        <div class="list-item-text">
          <div class="list-item-name" style="color:${CLR_MAP[x.clr]}">${x.name}</div>
          <div class="list-item-meta">${CAT_DPW[x.clr] !== undefined ? x.dpw + 'x/wk shared' : x.dpw + 'x/wk'}</div>
        </div>
        <div class="list-item-right">
          <div class="list-item-count">
            <span class="list-item-count-val">${c > 0 ? c : '\u2014'}</span>
            <span class="list-item-count-unit">${x.unit}</span>
          </div>
          <span class="tile-zone ${zone.cls}" title="${zone.label}"></span>
        </div>
      </a>`;
          }
          if (listOpen) html += '</div>';
          html += `<div class="muted" id="app-version" style="text-align:center;margin-top:24px"></div>`;

          app.innerHTML = html;
          document.getElementById('btn-export').addEventListener('click', exportData);
          document.getElementById('btn-import').addEventListener('click', importData);

          fetch('./service-worker.js')
              .then(r => r.text())
              .then(text => {
                  const m = text.match(/APP_VERSION\s*=\s*'([^']+)'/);
                  const el = document.getElementById('app-version');
                  if (m && el) el.textContent = 'v' + m[1];
              })
              .catch(() => {});
      }

      /* ---------- SWIPE STATE ---------- */
      let detailView = 'daily';   // 'daily' | 'volume' | 'weight', persisted across exercises
      let slideDirection = null;

      function setupSwipe(cardEl) {
          let sx = 0, sy = 0, st = 0, lx = 0, ly = 0, active = false;
          cardEl.style.touchAction = 'pan-y';
          cardEl.addEventListener('touchstart', (e) => {
              if (e.target.closest('canvas, button, input')) return;
              const t = e.touches[0];
              sx = lx = t.clientX; sy = ly = t.clientY; st = Date.now(); active = true;
          }, {passive:true});
          cardEl.addEventListener('touchmove', (e) => {
              if (!active) return;
              const t = e.touches[0];
              lx = t.clientX; ly = t.clientY;
          }, {passive:true});
          cardEl.addEventListener('touchend', () => {
              if (!active) return;
              active = false;
              const dx = lx - sx, dy = ly - sy, dt = Date.now() - st;
              if (Math.abs(dx) > 50 && Math.abs(dy) < 60 && dt < 500) {
                  const dir = dx > 0 ? -1 : 1;
                  const hash = location.hash.replace(/^#/, '');
                  const idx = EXERCISES.findIndex(ex => ex.id === hash);
                  if (idx === -1) return;
                  const next = idx + dir;
                  if (next >= 0 && next < EXERCISES.length) {
                      slideDirection = dir > 0 ? 'slide-left' : 'slide-right';
                      location.hash = EXERCISES[next].id;
                  }
              }
          }, {passive:true});
      }

      /* ---------- DETAIL ---------- */
      function renderDetail(id) {
          const ex = EXERCISES.find(e => e.id === id);
          if (!ex) { location.hash = ""; return; }

          const accentColor = CLR_MAP[ex.clr] || 'var(--accent)';
          const midLabel = UNIT_LABEL[ex.unit] || ex.unit;

          // Chart views available for this exercise; Weight only when loadable.
          const views = ex.loadable ? ['daily', 'volume', 'weight'] : ['daily', 'volume'];
          let view = views.includes(detailView) ? detailView : 'daily';

          // Stepper rows: sets and the unit-named middle field for every exercise;
          // weight only for loadable ones.
          const fields = [
              { key: 'sets', label: 'Sets',   unit: '' },
              { key: 'reps', label: midLabel, unit: '' }
          ];
          if (ex.loadable) fields.push({ key: 'weight', label: 'Weight', unit: WEIGHT_UNIT });

          const stepperRows = fields.map(f => `
        <div class="step-row">
          <div class="step-label">${f.label}</div>
          <button class="btn step-btn" data-field="${f.key}" data-dir="-1" aria-label="decrease ${f.label}">&ndash;</button>
          <div class="step-val" data-field="${f.key}" style="color:${accentColor}">0</div>
          <button class="btn step-btn" data-field="${f.key}" data-dir="1" aria-label="increase ${f.label}">+</button>
          <div class="muted step-unit">${f.unit}</div>
        </div>`).join('');

          const segButtons = views.map(v =>
              `<button data-view="${v}"${v === view ? ' class="active"' : ''}>${v[0].toUpperCase() + v.slice(1)}</button>`
          ).join('');

          document.title = ex.name;

          const slideClass = slideDirection || '';
          slideDirection = null;
          app.innerHTML = `
    <a class="back" href="#">&larr; All exercises</a>
    <div class="${slideClass}" id="slide-wrap">
    <div class="card${slideClass ? '' : ' fade'}">
      <div class="row">
        <h1 style="margin:0;font-size:20px;color:${accentColor}">${ex.name}</h1>
        <div>
          <label for="day" style="margin:0 0 4px;font-size:11px">Date</label>
          <input id="day" type="date" value="${todayStr()}">
        </div>
      </div>

      <div class="steppers" id="steppers">${stepperRows}</div>
      <div class="entry-total muted" id="entry-total"></div>
      <div class="note" id="status">Saved</div>

      <div class="chart-wrap">
        <div class="chart-head">
          <div class="muted" id="rangeLabel"></div>
          <div class="seg" id="view-seg">${segButtons}</div>
        </div>
        <canvas id="chart" width="600" height="200"></canvas>
      </div>

      <div class="stats" id="stats"></div>
    </div>
    </div>`;

          const $day      = document.getElementById('day');
          const $steppers = document.getElementById('steppers');
          const $total    = document.getElementById('entry-total');
          const $status   = document.getElementById('status');
          const $chart    = document.getElementById('chart');
          const $label    = document.getElementById('rangeLabel');
          const $seg      = document.getElementById('view-seg');
          const $stats    = document.getElementById('stats');

          const showSaved = () => { $status.textContent = 'Saved'; $status.style.opacity='1'; setTimeout(()=>{$status.style.opacity='.5';},250); };
          const formatAvg = (v) => v % 1 === 0 ? String(v) : v.toFixed(1);
          function trendArrow(current, previous) {
              if (current > previous) return '<span class="stat-arrow-up">&#9650;</span>';
              if (current < previous) return '<span class="stat-arrow-down">&#9660;</span>';
              return '<span class="stat-arrow-same">&#9654;</span>';
          }
          const statTile = (val, label) => `<div class="stat"><div class="stat-val">${val}</div><div class="stat-label">${label}</div></div>`;

          // Most recent recorded load, used to prefill the weight stepper so a
          // performed day defaults to last session's weight unless changed.
          const lastWeight = (() => {
              if (!ex.loadable) return 0;
              const ws = weightSeries(id);
              const ds = Object.keys(ws).sort();
              return ds.length ? ws[ds[ds.length - 1]] : 0;
          })();

          /* ---------- entry state ---------- */
          let entry = { sets: 1, reps: 0, weight: 0 };

          function renderSteppers() {
              for (const f of fields) {
                  const el = $steppers.querySelector(`.step-val[data-field="${f.key}"]`);
                  if (el) el.textContent = f.key === 'weight' ? formatAvg(entry.weight) : String(entry[f.key]);
              }
              const count = entry.sets * entry.reps;
              const load = ex.loadable && entry.weight > 0 ? ` @ ${formatAvg(entry.weight)} ${WEIGHT_UNIT}` : '';
              $total.textContent = count > 0 ? `${entry.sets} × ${entry.reps}${load} = ${count} ${ex.unit}` : 'Not logged this day';
          }

          function loadEntry(dateStr) {
              const e = readEntry(id, dateStr);
              if (ex.loadable && e.weight === 0) e.weight = lastWeight;
              entry = { sets: e.sets, reps: e.reps, weight: e.weight };
              renderSteppers();
          }

          function persist(dateStr) {
              writeEntry(id, dateStr, ex, entry);
              renderSteppers();
              showSaved();
              redrawAll();
          }

          $steppers.addEventListener('click', (e) => {
              const btn = e.target.closest('.step-btn');
              if (!btn) return;
              const key = btn.dataset.field;
              const dir = parseInt(btn.dataset.dir, 10);
              if (key === 'weight') {
                  entry.weight = Math.max(0, Math.round((entry.weight + dir * WEIGHT_STEP) * 100) / 100);
              } else {
                  entry[key] = Math.max(0, (entry[key] | 0) + dir);
              }
              persist($day.value);
          }, {passive:true});

          $day.addEventListener('change', () => { loadEntry($day.value); redrawAll(); });

          /* ---------- stats ---------- */
          function volumeStats() {
              const data = volumeSeries(id);
              const sortedDates = Object.keys(data).sort();
              const total = Object.values(data).reduce((s, v) => s + v, 0);
              const startDate = sortedDates.length > 0 ? sortedDates[0] : null;

              const thisWeek = getWeekTotal(id, 0);
              const lastWeek = getWeekTotal(id, 1);
              const arrow = trendArrow(thisWeek, lastWeek);
              const pooledDpw = CAT_DPW[ex.clr];
              let weekDays, targetDpw, freqLabel;
              if (pooledDpw !== undefined) {
                  weekDays = getCategoryWeekProgress(ex.clr); targetDpw = pooledDpw; freqLabel = `${pooledDpw}x/wk shared`;
              } else {
                  weekDays = getCurrentWeekProgress(id); targetDpw = ex.dpw; freqLabel = `${ex.dpw}x/wk`;
              }

              const ewma = ewmaWeeklyAt(data, new Date(todayStr()), VOL_OPTS);
              const zoneBase = bestEwma(data, VOL_OPTS);
              const zonePct = zoneBase > 0 ? Math.round((ewma / zoneBase) * 100) : null;
              const zoneLow = Math.floor(zoneBase);
              const zoneHigh = Math.ceil(zoneBase * ZONE_TOP);
              const trend90 = trendPerMonth(data, 90, VOL_OPTS);
              const trendSign = trend90 > 0.5 ? '+' : trend90 < -0.5 ? '' : '±';
              const trendVal = Math.abs(trend90) < 0.5 ? '0' : formatAvg(trend90);
              const streak = getStreak(data);
              const bestWk = bestWeekEver(data);

              return [
                  statTile(zonePct !== null ? zonePct + '%' : '—', 'Zone position'),
                  statTile(`${weekDays}/${targetDpw}`, `This wk (${freqLabel})`),
                  statTile(`${arrow} ${thisWeek}`, `Wk vol (prev ${lastWeek})`),
                  statTile(formatAvg(ewma), 'EWMA/wk'),
                  statTile(`${trendSign}${trendVal}`, 'Trend/mo'),
                  statTile(zoneBase > 0 ? zoneLow + '–' + zoneHigh : '—', 'Green zone/wk'),
                  statTile(streak.current, 'Streak'),
                  statTile(streak.best, 'Best streak'),
                  statTile(bestWk, 'Best wk'),
                  statTile(total, `All-time ${ex.unit}`),
                  statTile(sortedDates.length, 'Days recorded'),
                  statTile(startDate || '—', 'Since')
              ].join('');
          }

          function weightStats() {
              const data = weightSeries(id);
              const dates = Object.keys(data).sort();
              const u = WEIGHT_UNIT;
              if (dates.length === 0) {
                  return statTile('—', 'Zone position') + statTile('—', `Level ${u}`) +
                      `<div class="stat" style="grid-column:1/-1"><div class="stat-label">No weight logged yet. Add a load above to start the weight chart.</div></div>`;
              }
              const ewma = ewmaWeeklyAt(data, new Date(todayStr()), WT_OPTS);
              const base = bestEwma(data, WT_OPTS);
              const pct = base > 0 ? Math.round((ewma / base) * 100) : null;
              const trend90 = trendPerMonth(data, 90, WT_OPTS);
              const trendSign = trend90 > 0.05 ? '+' : trend90 < -0.05 ? '' : '±';
              const trendVal = Math.abs(trend90) < 0.05 ? '0' : formatAvg(trend90);
              const heaviest = Math.max(...Object.values(data));
              const latest = data[dates[dates.length - 1]];

              return [
                  statTile(pct !== null ? pct + '%' : '—', 'Zone position'),
                  statTile(formatAvg(ewma), `Level ${u}`),
                  statTile(base > 0 ? formatAvg(base) + '–' + formatAvg(base * ZONE_TOP) : '—', `Green zone ${u}`),
                  statTile(`${trendSign}${trendVal}`, `Trend/mo ${u}`),
                  statTile(formatAvg(heaviest), `Heaviest ${u}`),
                  statTile(formatAvg(latest), `Latest ${u}`),
                  statTile(dates.length, 'Days weighted'),
                  statTile(dates[0], 'Since')
              ].join('');
          }

          function updateStats() {
              $stats.innerHTML = view === 'weight' ? weightStats() : volumeStats();
          }

          /* ---------- charts ---------- */
          const barColor = getComputedStyle(document.documentElement).getPropertyValue(`--clr-${ex.clr}`).trim() || '#6ea8fe';
          const chartBg  = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#0c0c14';

          // Metric descriptors for the generic zone chart.
          const METRICS = {
              volume: { series: () => volumeSeries(id), opts: VOL_OPTS, label: 'Volume EWMA/wk' },
              weight: { series: () => weightSeries(id), opts: WT_OPTS, label: `Weight (${WEIGHT_UNIT})` }
          };

          function prepCanvas() {
              const dpr = window.devicePixelRatio || 1;
              const cssW = $chart.clientWidth, cssH = $chart.clientHeight;
              $chart.width = Math.round(cssW * dpr);
              $chart.height = Math.round(cssH * dpr);
              const ctx = $chart.getContext('2d');
              ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
              ctx.clearRect(0, 0, cssW, cssH);
              return { ctx, cssW, cssH };
          }

          // --- daily bars (volume), split into one segment per set ---
          let maxOffsetDays = 0;
          let offsetDays = 0;
          let pxPerDay = 8;

          function computeBounds() {
              let minDS = todayStr(), hasAny = false;
              for (let i = 0; i < localStorage.length; i++) {
                  const k = localStorage.key(i);
                  if (!k) continue;
                  const ds = parseDateKey(k, id, 'count');
                  if (ds) { hasAny = true; if (ds < minDS) minDS = ds; }
              }
              const today = todayStr();
              maxOffsetDays = Math.max(0, daysBetween(hasAny ? minDS : today, today) - (WINDOW_DAYS - 1));
              offsetDays = clamp(offsetDays, 0, maxOffsetDays);
          }

          function getHistoryWindow(endISO, days) {
              const end = new Date(endISO);
              const start = addDays(end, -(days - 1));
              const labels = [], counts = [], setsArr = [];
              for (let i = 0; i < days; i++) {
                  const ds = isoDate(addDays(start, i));
                  const e = readEntry(id, ds);
                  labels.push(ds.slice(5));
                  counts.push(e.count);
                  setsArr.push(e.count > 0 ? Math.max(1, e.sets) : 0);
              }
              return { labels, counts, setsArr, startISO: isoDate(start), endISO: isoDate(end) };
          }

          function drawDaily() {
              const endISO = isoDate(addDays(new Date(todayStr()), -offsetDays));
              const { labels, counts, setsArr, startISO, endISO: eISO } = getHistoryWindow(endISO, WINDOW_DAYS);
              const { ctx, cssW, cssH } = prepCanvas();

              const pad = { l: 32, r: 8, t: 8, b: 24 };
              const w = cssW - pad.l - pad.r;
              const h = cssH - pad.t - pad.b;
              const maxV = Math.max(5, ...counts);
              const barGap = 6;
              const barW = Math.max(4, (w - barGap * (counts.length - 1)) / counts.length);
              pxPerDay = w / WINDOW_DAYS;

              ctx.strokeStyle = 'rgba(255,255,255,0.1)';
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(pad.l, pad.t);
              ctx.lineTo(pad.l, pad.t + h);
              ctx.lineTo(pad.l + w, pad.t + h);
              ctx.stroke();

              ctx.fillStyle = 'rgba(255,255,255,0.45)';
              ctx.font = '11px -apple-system, system-ui, Arial';
              ctx.textAlign = 'right';
              ctx.textBaseline = 'middle';
              ctx.fillText('0', pad.l - 6, pad.t + h);
              ctx.fillText(String(maxV), pad.l - 6, pad.t);

              const startX = pad.l;
              for (let i = 0; i < counts.length; i++) {
                  const v = counts[i];
                  if (v <= 0) continue;
                  const x = startX + i * (barW + barGap);
                  const bh = (v / maxV) * h;
                  const y = pad.t + h - bh;
                  const r = Math.min(3, barW / 2);

                  ctx.fillStyle = barColor;
                  ctx.globalAlpha = 0.7;
                  ctx.beginPath();
                  if (bh > r) {
                      ctx.moveTo(Math.round(x), Math.round(y + bh));
                      ctx.lineTo(Math.round(x), Math.round(y + r));
                      ctx.quadraticCurveTo(Math.round(x), Math.round(y), Math.round(x + r), Math.round(y));
                      ctx.lineTo(Math.round(x + barW - r), Math.round(y));
                      ctx.quadraticCurveTo(Math.round(x + barW), Math.round(y), Math.round(x + barW), Math.round(y + r));
                      ctx.lineTo(Math.round(x + barW), Math.round(y + bh));
                  } else {
                      ctx.rect(Math.round(x), Math.round(y), Math.round(barW), Math.round(bh));
                  }
                  ctx.fill();

                  // divider lines between sets, drawn in the background colour
                  const sets = setsArr[i];
                  if (sets > 1 && bh > 4) {
                      ctx.globalAlpha = 1;
                      ctx.strokeStyle = chartBg;
                      ctx.lineWidth = 1.5;
                      for (let s = 1; s < sets; s++) {
                          const dy = Math.round(pad.t + h - (s / sets) * bh);
                          ctx.beginPath();
                          ctx.moveTo(Math.round(x), dy);
                          ctx.lineTo(Math.round(x + barW), dy);
                          ctx.stroke();
                      }
                  }
              }
              ctx.globalAlpha = 1;

              ctx.fillStyle = 'rgba(255,255,255,0.4)';
              ctx.font = '10px -apple-system, system-ui, Arial';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'top';
              const step = Math.max(1, Math.ceil(labels.length / 5));
              for (let i = 0; i < labels.length; i += step) {
                  const x = startX + i * (barW + barGap) + barW / 2;
                  ctx.fillText(labels[i], Math.round(x), pad.t + h + 5);
              }

              $label.textContent = `${startISO}  →  ${eISO}`;
          }

          // --- generic zone chart: EWMA with running-best green band ---
          const ZONE_WEEKS = 26;
          let zoneOffsetWeeks = 0;
          let maxZoneOffset = 0;
          let pxPerWeek = 8;

          function zoneData(data, opts, numWeeks, offsetWeeks) {
              const dates = Object.keys(data).sort();
              if (dates.length === 0) return { curve: [], band: [] };

              const firstDate = new Date(dates[0]);
              const today = new Date(todayStr());
              const endRef = addDays(today, -offsetWeeks * 7);
              const numDays = numWeeks * 7;
              const windowStart = addDays(endRef, -(numDays - 1));

              // Running best baseline EWMA accumulated up to the visible window.
              const firstEligible = addDays(firstDate, BASELINE_MIN_DAYS);
              let runningBest = 0;
              const preDays = Math.max(0, daysBetween(isoDate(firstEligible), isoDate(windowStart)));
              for (let d = 0; d <= preDays; d++) {
                  const end = addDays(firstEligible, d);
                  if (end > windowStart) break;
                  const val = baselineAt(data, end, opts);
                  if (val > runningBest) runningBest = val;
              }

              const curve = [];
              for (let i = numDays - 1; i >= 0; i--) {
                  const end = addDays(endRef, -i);
                  curve.push({ date: isoDate(end), value: ewmaWeeklyAt(data, end, opts) });
              }

              const band = [];
              for (let i = numWeeks - 1; i >= 0; i--) {
                  const end = addDays(endRef, -i * 7);
                  const daysSinceFirst = daysBetween(isoDate(firstDate), isoDate(end));
                  let target = 0;
                  if (daysSinceFirst >= BASELINE_MIN_DAYS) {
                      const val = baselineAt(data, end, opts);
                      if (val > runningBest) runningBest = val;
                      target = runningBest;
                  }
                  band.push({ date: isoDate(end), target });
              }
              return { curve, band };
          }

          function computeZoneBounds(data) {
              const dates = Object.keys(data).sort();
              if (dates.length === 0) { maxZoneOffset = 0; return; }
              const firstDate = new Date(dates[0]);
              const today = new Date(todayStr());
              const totalWeeks = Math.floor((today - firstDate) / (7 * 864e5));
              maxZoneOffset = Math.max(0, totalWeeks - ZONE_WEEKS + 1);
              zoneOffsetWeeks = clamp(zoneOffsetWeeks, 0, maxZoneOffset);
          }

          function drawZone(metricKey) {
              const m = METRICS[metricKey];
              const data = m.series();
              computeZoneBounds(data);
              const { curve, band } = zoneData(data, m.opts, ZONE_WEEKS, zoneOffsetWeeks);
              const { ctx, cssW, cssH } = prepCanvas();

              if (curve.length === 0) {
                  $label.textContent = `${m.label}  —  no data yet`;
                  return;
              }

              const pad = { l: 40, r: 8, t: 8, b: 24 };
              const w = cssW - pad.l - pad.r;
              const h = cssH - pad.t - pad.b;
              const nd = curve.length;
              const nb = band.length;

              const allVals = curve.map(p => p.value)
                  .concat(band.flatMap(p => [p.target * ZONE_TOP, p.target]));
              const maxV = Math.max(5, ...allVals) * 1.1;

              const toY = v => pad.t + h - (v / maxV) * h;
              const curveX = i => pad.l + (i / (nd - 1)) * w;
              const bandX = i => pad.l + (i / (nb - 1)) * w;
              pxPerWeek = w / (nb - 1);

              const first = band.findIndex(p => p.target > 0);
              if (first >= 0) {
                  ctx.fillStyle = 'rgba(74,222,128,0.12)';
                  ctx.beginPath();
                  for (let i = first; i < nb; i++) ctx.lineTo(bandX(i), toY(band[i].target * ZONE_TOP));
                  for (let i = nb - 1; i >= first; i--) ctx.lineTo(bandX(i), toY(band[i].target));
                  ctx.closePath();
                  ctx.fill();

                  ctx.setLineDash([4, 4]);
                  ctx.strokeStyle = 'rgba(74,222,128,0.4)';
                  ctx.lineWidth = 1;
                  ctx.beginPath();
                  ctx.moveTo(bandX(first), toY(band[first].target));
                  for (let i = first + 1; i < nb; i++) ctx.lineTo(bandX(i), toY(band[i].target));
                  ctx.stroke();
                  ctx.beginPath();
                  ctx.moveTo(bandX(first), toY(band[first].target * ZONE_TOP));
                  for (let i = first + 1; i < nb; i++) ctx.lineTo(bandX(i), toY(band[i].target * ZONE_TOP));
                  ctx.stroke();
                  ctx.setLineDash([]);
              }

              ctx.strokeStyle = 'rgba(255,255,255,0.1)';
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(pad.l, pad.t);
              ctx.lineTo(pad.l, pad.t + h);
              ctx.lineTo(pad.l + w, pad.t + h);
              ctx.stroke();

              ctx.fillStyle = 'rgba(255,255,255,0.45)';
              ctx.font = '11px -apple-system, system-ui, Arial';
              ctx.textAlign = 'right';
              ctx.textBaseline = 'middle';
              ctx.fillText('0', pad.l - 6, pad.t + h);
              ctx.fillText(String(Math.round(maxV)), pad.l - 6, pad.t);

              ctx.strokeStyle = barColor;
              ctx.lineWidth = 2;
              ctx.beginPath();
              for (let i = 0; i < nd; i++) {
                  const x = curveX(i), y = toY(curve[i].value);
                  if (i === 0) ctx.moveTo(x, y);
                  else ctx.lineTo(x, y);
              }
              ctx.stroke();

              if (nd >= 14) {
                  const vals = curve.map(p => p.value);
                  const slope = linRegSlope(vals);
                  const mean = vals.reduce((a, b) => a + b, 0) / nd;
                  const midX = (nd - 1) / 2;
                  const y0 = mean - slope * midX;
                  const y1 = mean + slope * (nd - 1 - midX);
                  ctx.setLineDash([6, 4]);
                  ctx.strokeStyle = slope > 0 ? 'rgba(74,222,128,0.6)' : slope < 0 ? 'rgba(248,113,113,0.6)' : 'rgba(255,255,255,0.3)';
                  ctx.lineWidth = 1.5;
                  ctx.beginPath();
                  ctx.moveTo(curveX(0), toY(y0));
                  ctx.lineTo(curveX(nd - 1), toY(y1));
                  ctx.stroke();
                  ctx.setLineDash([]);
              }

              ctx.fillStyle = 'rgba(255,255,255,0.4)';
              ctx.font = '10px -apple-system, system-ui, Arial';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'top';
              const step = Math.max(1, Math.ceil(nd / 6));
              for (let i = 0; i < nd; i += step) {
                  ctx.fillText(curve[i].date.slice(5), curveX(i), pad.t + h + 5);
              }

              $label.textContent = `${m.label}  —  ${curve[0].date} → ${curve[nd - 1].date}`;
          }

          function drawActiveChart() {
              if (view === 'daily') drawDaily();
              else drawZone(view);
          }

          function redrawAll() {
              computeBounds();
              drawActiveChart();
              updateStats();
          }

          $seg.addEventListener('click', (e) => {
              const btn = e.target.closest('button[data-view]');
              if (!btn) return;
              view = btn.dataset.view;
              detailView = view;
              for (const b of $seg.querySelectorAll('button')) b.classList.toggle('active', b.dataset.view === view);
              drawActiveChart();
              updateStats();
          });

          /* ---------- chart pan / zoom ---------- */
          let dragging = false;
          let startX = 0;

          $chart.addEventListener('pointerdown', (e) => {
              dragging = true;
              startX = e.clientX;
              $chart.setPointerCapture(e.pointerId);
              $chart.style.cursor = 'grabbing';
          });
          $chart.addEventListener('pointermove', (e) => {
              if (!dragging) return;
              const dx = e.clientX - startX;
              if (view === 'daily') {
                  const deltaDays = Math.round(dx / pxPerDay);
                  if (deltaDays !== 0) { offsetDays = clamp(offsetDays + deltaDays, 0, maxOffsetDays); startX += deltaDays * pxPerDay; drawActiveChart(); }
              } else {
                  const deltaWeeks = Math.round(dx / pxPerWeek);
                  if (deltaWeeks !== 0) { zoneOffsetWeeks = clamp(zoneOffsetWeeks + deltaWeeks, 0, maxZoneOffset); startX += deltaWeeks * pxPerWeek; drawActiveChart(); }
              }
          });
          function endDrag(e) {
              if (!dragging) return;
              dragging = false;
              $chart.style.cursor = 'grab';
              try { $chart.releasePointerCapture(e.pointerId); } catch {}
          }
          $chart.addEventListener('pointerup', endDrag);
          $chart.addEventListener('pointercancel', endDrag);
          $chart.addEventListener('pointerleave', endDrag);

          $chart.addEventListener('wheel', (e) => {
              e.preventDefault();
              const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
              if (view === 'daily') {
                  offsetDays = clamp(offsetDays + (delta > 0 ? -3 : 3), 0, maxOffsetDays);
              } else {
                  zoneOffsetWeeks = clamp(zoneOffsetWeeks + (delta > 0 ? -2 : 2), 0, maxZoneOffset);
              }
              drawActiveChart();
          }, {passive:false});

          const onKey = (e) => {
              if (view === 'daily') {
                  if (e.key === 'ArrowLeft')  { offsetDays = clamp(offsetDays + 1, 0, maxOffsetDays); drawActiveChart(); }
                  if (e.key === 'ArrowRight') { offsetDays = clamp(offsetDays - 1, 0, maxOffsetDays); drawActiveChart(); }
              } else {
                  if (e.key === 'ArrowLeft')  { zoneOffsetWeeks = clamp(zoneOffsetWeeks + 1, 0, maxZoneOffset); drawActiveChart(); }
                  if (e.key === 'ArrowRight') { zoneOffsetWeeks = clamp(zoneOffsetWeeks - 1, 0, maxZoneOffset); drawActiveChart(); }
              }
          };
          document.addEventListener('keydown', onKey);

          // init
          loadEntry($day.value);
          computeBounds();
          drawActiveChart();
          updateStats();
          addEventListener('resize', drawActiveChart, {passive:true});

          (function showSavedInit(){ $status.textContent='Saved'; $status.style.opacity='.5'; })();

          setupSwipe(document.querySelector('.card'));
      }

      /* ---------- DASHBOARD ---------- */
      function renderDashboard() {
          document.title = "Dashboard";
          const today = todayStr();
          const todayDate = new Date(today);

          // Overall stats: days active in sliding 7-day window
          let daysActiveThisWeek = 0;
          for (let i = 0; i < 7; i++) {
              const ds = isoDate(addDays(todayDate, -i));
              let anyDone = false;
              for (const ex of EXERCISES) {
                  const v = parseInt(localStorage.getItem(keysFor(ex.id, ds).count) || "0", 10);
                  if (v > 0) { anyDone = true; break; }
              }
              if (anyDone) daysActiveThisWeek++;
          }
          const onTrackCount = EXERCISES.filter(ex => isOnTrack(ex.id, ex.dpw)).length;

          // Group by category (data-driven from clr field)
          const categories = [];
          const seen = new Set();
          for (const ex of EXERCISES) {
              if (!seen.has(ex.clr)) {
                  seen.add(ex.clr);
                  categories.push(ex.clr);
              }
          }

          let html = `
    <div class="dash-header">
      <h1>Dashboard</h1>
      <a class="back" href="#">&larr; Back</a>
    </div>
    <div class="dash-overall fade">
      <div class="stat"><div class="stat-val">${daysActiveThisWeek}/7</div><div class="stat-label">Days active this wk</div></div>
      <div class="stat"><div class="stat-val">${onTrackCount}/${EXERCISES.length}</div><div class="stat-label">On track</div></div>
      <div class="stat"><div class="stat-val">${EXERCISES.filter(ex => parseInt(localStorage.getItem(keysFor(ex.id, today).count) || "0", 10) > 0).length}/${EXERCISES.length}</div><div class="stat-label">Done today</div></div>
    </div>`;

          for (const cat of categories) {
              const exs = EXERCISES.filter(e => e.clr === cat);
              const catLabel = SECTION_LABELS[cat] || cat;
              const catColor = CLR_MAP[cat] || 'var(--accent)';

              // Category completion: % of exercises on track
              const catOnTrack = exs.filter(ex => isOnTrack(ex.id, ex.dpw)).length;
              const catPct = Math.round((catOnTrack / exs.length) * 100);

              html += `<div class="dash-cat fade">
        <div class="dash-cat-header">
          <div class="dash-cat-title" style="color:${catColor}">${catLabel}</div>
          <div class="dash-cat-pct" style="color:${catPct === 100 ? '#4ade80' : catColor}">${catPct}%</div>
        </div>
        <div class="dash-bar-track">
          <div class="dash-bar-fill" style="width:${catPct}%;background:${catColor}"></div>
        </div>`;

              const pooledDpw = CAT_DPW[cat];
              const pooledProgress = pooledDpw !== undefined ? getCategoryWeekProgress(cat) : null;

              for (const ex of exs) {
                  const onTrack = isOnTrack(ex.id, ex.dpw);
                  let freqLabel;
                  if (pooledDpw !== undefined) {
                      freqLabel = `${pooledProgress}/${pooledDpw} this wk`;
                  } else {
                      const done = getCurrentWeekProgress(ex.id);
                      freqLabel = `${done}/${ex.dpw} this wk`;
                  }

                  // Sparkline: last 7 days
                  const sparkVals = [];
                  for (let i = 6; i >= 0; i--) {
                      const ds = isoDate(addDays(todayDate, -i));
                      sparkVals.push(parseInt(localStorage.getItem(keysFor(ex.id, ds).count) || "0", 10));
                  }
                  const sparkMax = Math.max(1, ...sparkVals);
                  const sparkBars = sparkVals.map(v => {
                      const h = Math.max(1, Math.round((v / sparkMax) * 20));
                      const opacity = v > 0 ? '0.8' : '0.15';
                      return `<div class="dash-spark-bar" style="height:${h}px;background:${catColor};opacity:${opacity}"></div>`;
                  }).join('');

                  const statusColor = onTrack ? '#4ade80' : 'rgba(255,255,255,.15)';

                  html += `
        <div class="dash-ex-row">
          <div class="dash-ex-status" style="background:${statusColor}"></div>
          <a href="#${ex.id}" class="dash-ex-name" style="color:var(--text);text-decoration:none">${ex.name}</a>
          <div class="dash-spark">${sparkBars}</div>
          <div class="dash-ex-freq">${freqLabel}</div>
        </div>`;
              }

              html += `</div>`;
          }

          app.innerHTML = html;
      }

      /* ---------- ROUTER ---------- */
      function route() {
          const id = location.hash.replace(/^#/, '');
          if (id === 'dashboard') renderDashboard();
          else if (id) renderDetail(id);
          else renderHome();
      }
      addEventListener('hashchange', route, {passive:true});
      route();
    </script>
  </body>
</html>
